<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mock Interview Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Default Theme (Friendly HR) */
            --bg-color: #fdf2f8;
            --surface: #ffffff;
            --primary: #ec4899;
            --primary-hover: #db2777;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --chat-int: #fce7f3;
            --chat-cand: #f1f5f9;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --font: 'Inter', sans-serif;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        /* Dynamic Themes */
        body[data-theme="Senior Engineer"] {
            --bg-color: #0f172a;
            --surface: #1e293b;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --chat-int: #334155;
            --chat-cand: #4c1d95;
        }
        body[data-theme="Google Interviewer"] {
            --bg-color: #f8f9fa;
            --surface: #ffffff;
            --primary: #4285f4;
            --primary-hover: #357ae8;
            --text-main: #202124;
            --text-muted: #5f6368;
            --border: #dadce0;
            --chat-int: #e8f0fe;
            --chat-cand: #f1f3f4;
        }
        body[data-theme="Startup Founder"] {
            --bg-color: #fffbeb;
            --surface: #ffffff;
            --primary: #f59e0b;
            --primary-hover: #d97706;
            --text-main: #1c1917;
            --text-muted: #78716c;
            --border: #e7e5e4;
            --chat-int: #fef3c7;
            --chat-cand: #f5f5f4;
        }
        body[data-theme="Strict Interviewer"] {
            --bg-color: #e2e8f0;
            --surface: #ffffff;
            --primary: #334155;
            --primary-hover: #1e293b;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border: #cbd5e1;
            --chat-int: #f1f5f9;
            --chat-cand: #e2e8f0;
        }

        * { box-sizing: border-box; transition: background-color 0.3s, border-color 0.3s, color 0.3s; }
        
        body { 
            font-family: var(--font); 
            background: var(--bg-color); 
            color: var(--text-main);
            margin: 0; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .app-layout {
            display: flex;
            width: 95vw;
            max-width: 1400px;
            height: 90vh;
            background: var(--surface);
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            overflow: hidden;
        }

        /* --- LEFT SIDEBAR (Config) --- */
        .sidebar {
            width: 380px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 30px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .sidebar h2 { margin: 0 0 5px 0; font-size: 22px; font-weight: 700; }
        .sidebar h5 { margin: 0 0 25px 0; color: var(--text-muted); font-weight: 400; font-size: 14px;}
        
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;}
        select, input[type="file"] { 
            width: 100%; padding: 12px; margin-bottom: 20px; 
            border-radius: 8px; border: 1px solid var(--border); 
            background: var(--bg-color); color: var(--text-main); font-size: 14px; outline: none;
        }
        select:focus { border-color: var(--primary); }

        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .mode-btn {
            background: var(--bg-color); color: var(--text-main);
            border: 1px solid var(--border); border-radius: 8px;
            padding: 10px; font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center;
            text-align: center; height: 50px;
        }
        .mode-btn:hover { border-color: var(--primary); }
        .mode-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
        .mode-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .upload-card { background: var(--bg-color); padding: 15px; border-radius: 12px; border: 1px dashed var(--border); margin-bottom: 25px; }
        .upload-actions { display: flex; gap: 10px; margin-top: 10px; }
        #uploadBtn { flex: 1; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        #uploadBtn:disabled { opacity: 0.6; }
        #uploadStatus { font-size: 12px; margin-top: 8px; }

        .start-btn { 
            background: var(--primary); color: white; border: none; padding: 16px; 
            border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; 
            margin-top: auto; box-shadow: 0 4px 14px rgba(0,0,0,0.1); transition: transform 0.1s;
        }
        .start-btn:active { transform: scale(0.98); }

        /* --- RIGHT MAIN AREA (Interview) --- */
        .main-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-color); position: relative;}
        
        .interview-header {
            padding: 20px 30px; background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        
        /* Avatar & TTS Animation */
        .avatar-section { display: flex; align-items: center; gap: 15px; }
        .avatar-ring {
            width: 56px; height: 56px; border-radius: 50%; padding: 3px;
            background: transparent; transition: all 0.3s ease; position: relative;
        }
        .avatar-ring.speaking {
            background: linear-gradient(45deg, var(--primary), #a855f7);
            animation: pulse-ring 1.5s infinite alternate;
        }
        .avatar-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid var(--surface); }
        .avatar-info h3 { margin: 0; font-size: 16px; }
        .avatar-info p { margin: 2px 0 0 0; font-size: 12px; color: var(--primary); font-weight: 600;}
        
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(var(--primary), 0.7); }
            100% { box-shadow: 0 0 0 10px rgba(var(--primary), 0); }
        }

        #timerBox { background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 8px 16px; border-radius: 20px; font-weight: 700; font-size: 14px; border: 1px solid rgba(239, 68, 68, 0.2); }

        .chat { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth;}
        .msg { padding: 16px 20px; border-radius: 16px; max-width: 75%; line-height: 1.5; font-size: 15px; position: relative; animation: fadeIn 0.3s ease-out;}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .interviewer { background: var(--chat-int); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(0,0,0,0.05); }
        .candidate { background: var(--chat-cand); align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: var(--shadow); }
        .msg b { display: block; font-size: 12px; margin-bottom: 6px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.5px;}

        /* Input Section & STT */
        .input-section { padding: 25px 30px; background: var(--surface); border-top: 1px solid var(--border); }
        .input-wrapper { display: flex; gap: 15px; align-items: flex-end; }
        textarea { 
            flex: 1; height: 60px; max-height: 120px; resize: none; 
            padding: 15px; border-radius: 12px; border: 1px solid var(--border); 
            background: var(--bg-color); color: var(--text-main); font-size: 15px; font-family: var(--font);
            outline: none; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        textarea:focus { border-color: var(--primary); }
        
        .controls-col { display: flex; flex-direction: column; gap: 10px; }
        .action-row { display: flex; gap: 10px; }
        
        .icon-btn {
            width: 60px; height: 60px; border-radius: 12px; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 20px; transition: all 0.2s;
        }
        #micBtn { background: var(--bg-color); border: 1px solid var(--border); color: var(--text-main); }
        #micBtn:hover { border-color: var(--primary); color: var(--primary); }
        #micBtn.recording { background: #ef4444; color: white; border-color: #ef4444; animation: mic-pulse 1.5s infinite; }
        @keyframes mic-pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 100% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } }
        
        #submitBtn { background: var(--primary); color: white; flex: 1; font-weight: 600; font-size: 15px; border-radius: 12px; border: none; }
        .rep-btn { background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; }
        .rep-btn:hover { background: var(--bg-color); color: var(--text-main); }

        /* Report View overlay */
        #report { 
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
            background: var(--surface); padding: 40px; overflow-y: auto; z-index: 10; display: none;
        }
        .report-header { text-align: center; margin-bottom: 40px; }
        .score-circle { 
            width: 120px; height: 120px; border-radius: 50%; background: var(--primary); color: white;
            display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 800;
            margin: 0 auto 15px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .report-grid { display: grid; gap: 20px; max-width: 800px; margin: 0 auto; }
        .report-card { background: var(--bg-color); border: 1px solid var(--border); border-radius: 16px; padding: 25px; }
        .q-title { font-weight: 600; color: var(--primary); margin-bottom: 10px; }
        .a-text { color: var(--text-muted); font-style: italic; margin-bottom: 20px; background: var(--surface); padding: 15px; border-radius: 8px; }
        
        .feedback-box { display: flex; gap: 20px; margin-top: 15px; }
        .fb-item { flex: 1; background: var(--surface); padding: 15px; border-radius: 8px; border-left: 4px solid; }
        .fb-item.strength { border-color: #10b981; }
        .fb-item.improve { border-color: #f59e0b; }
        .fb-item h4 { margin: 0 0 5px 0; font-size: 12px; text-transform: uppercase; }
        .fb-item p { margin: 0; font-size: 14px; }
        
        .score-bar-container { background: var(--border); height: 8px; border-radius: 4px; margin: 15px 0; overflow: hidden; }
        .score-bar-fill { background: var(--primary); height: 100%; border-radius: 4px; }
        
        /* Utility */
        .hidden { display: none !important; }
        
        /* Report Dashboard CSS */
        .dash-container { padding: 20px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin: 25px 0; }
        .kpi-card { background: var(--bg-color); padding: 20px; border-radius: 12px; border-left: 4px solid var(--primary); }
        .kpi-title { font-size: 12px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
        .kpi-value { font-size: 32px; font-weight: 700; color: var(--text-main); margin-bottom: 5px; }
        .kpi-sub { font-size: 13px; color: var(--text-muted); }
        
        .dash-main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0; }
        .dash-panel { background: var(--bg-color); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .panel-header { font-size: 14px; font-weight: 700; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); color: var(--primary); }
        
        .dim-row { margin-bottom: 15px; }
        .dim-header { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
        .dim-bar-bg { background: var(--border); height: 8px; border-radius: 4px; overflow: hidden; }
        .dim-bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease-out; }
        
        .badge-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .badge { display: inline-flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge.strength { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge.improve { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.3); }
        
        .roadmap { display: flex; flex-direction: column; gap: 10px; }
        .roadmap-item { background: var(--surface); padding: 12px; border-radius: 8px; border-left: 3px solid var(--primary); }
        .roadmap-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .roadmap-desc { font-size: 13px; color: var(--text-main); line-height: 1.4; }
        
        .qa-list { display: flex; flex-direction: column; gap: 15px; }
        .qa-card { background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .qa-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; gap: 10px; }
        .qa-q { font-weight: 600; font-size: 15px; flex: 1; }
        .qa-score { font-weight: 700; padding: 4px 12px; border-radius: 6px; border: 2px solid; font-size: 12px; white-space: nowrap; }
        .qa-a { background: var(--bg-color); padding: 12px; border-radius: 8px; font-size: 14px; font-style: italic; color: var(--text-muted); margin: 12px 0; }
        .qa-feedback { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .qa-fb-box { background: var(--bg-color); padding: 12px; border-radius: 8px; border-left: 3px solid; display: flex; flex-direction: column; gap: 6px; }
        .qa-fb-good { border-color: var(--success); }
        .qa-fb-bad { border-color: var(--warning); }
        .qa-fb-box h4 { margin: 0; font-size: 12px; display: flex; align-items: center; gap: 6px; text-transform: uppercase; font-weight: 700; }
        .qa-fb-box p { margin: 0; font-size: 13px; color: var(--text-main); }
    </style>
</head>
<body data-theme="Friendly HR">

<div class="app-layout">
    <aside class="sidebar" id="setupPanel">
        <h2>Setup Interview</h2>
        <h5>Configure your AI session parameters</h5>
        
        <label>Target Role</label>
        <select id="role">
            <option>Software Engineer</option>
            <option>Data Analyst</option>
            <option>Product Manager</option>
        </select>
        
        <label>Select Interviewer Persona</label>
        <div id="modeGroup" class="mode-grid">
            <button type="button" class="mode-btn active" onclick="selectMode(this, 'Friendly HR')">Friendly HR</button>
            <button type="button" class="mode-btn" onclick="selectMode(this, 'Senior Engineer')">Senior Engineer</button>
            <button type="button" class="mode-btn" onclick="selectMode(this, 'Google Interviewer')">Google Interviewer</button>
            <button type="button" class="mode-btn" onclick="selectMode(this, 'Startup Founder')">Startup Founder</button>
            <button type="button" class="mode-btn" onclick="selectMode(this, 'Strict Interviewer')" style="grid-column: span 2;">Strict Interviewer</button>
        </div>

        <div class="upload-card">
            <label>Contextual Resume (.pdf, .docx)</label>
            <input type="file" id="resumeFile" accept=".pdf,.docx">
            <div class="upload-actions">
                <button type="button" id="uploadBtn" onclick="uploadResumeFile()">Attach Document</button>
            </div>
            <div id="uploadStatus">No resume loaded (Background phase will skip).</div>
        </div>

        <button class="start-btn" id="startSessionBtn" onclick="initInterview()">Start Interview Session</button>
    </aside>

    <main class="main-area">
        <header class="interview-header">
            <div class="avatar-section">
                <div class="avatar-ring" id="avatarRing">
                    <img id="interviewerAvatar" src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&w=150&q=80" alt="Avatar">
                </div>
                <div class="avatar-info">
                    <h3 id="avatarName">Friendly HR</h3>
                    <p>AI Interviewer</p>
                </div>
            </div>
            <div id="timerBox" style="display: none;">Time Left: 05:00</div>
        </header>

        <div class="chat" id="chatBox">
            <div style="margin: auto; color: var(--text-muted); text-align: center;">
                <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="opacity:0.3; margin-bottom:10px;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 20.25c4.97 0 9-3.694 9-8.25s-4.03-8.25-9-8.25S3 7.444 3 12c0 2.104.859 4.023 2.273 5.48.432.447.74 1.04.586 1.641a4.483 4.483 0 01-.923 1.785A5.969 5.969 0 006 21c1.282 0 2.47-.402 3.445-1.087.81.22 1.668.337 2.555.337z"></path></svg>
                <br>Configure settings and click start.
            </div>
        </div>

        <div class="input-section">
            <div class="input-wrapper">
                <textarea id="answer" placeholder="Type your response or use voice dictation..." disabled></textarea>
                <div class="controls-col">
                    <div class="action-row">
                        <button id="micBtn" class="icon-btn" onclick="toggleMic()" title="Dictate Answer" disabled>
                            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"></path></svg>
                        </button>
                        <button id="submitBtn" onclick="sendResponse()" disabled>
                            Send
                        </button>
                    </div>
                    <button class="rep-btn" onclick="showReport(false)" id="endBtn" disabled>End & View Report</button>
                </div>
            </div>
        </div>

        <div id="report"></div>
    </main>
</div>
<script>
    // --- STATE VARIABLES (Preserved strictly as requested) ---
    let currentQuestion = "";
    let currentRole = "";
    let currentMode = "Friendly HR"; 
    let followUpCount = 0;
    let countdownInterval = null;
    let interviewActive = false;
    let isAutoTriggered = false;

    // --- ENHANCEMENT: Avatars & Themes Mapping ---
    const modeConfig = {
        'Friendly HR': { img: 'https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&w=150&q=80', name: 'Sarah (HR)' },
        'Senior Engineer': { img: 'https://images.unsplash.com/photo-1531427186611-ecfd6d936c79?auto=format&fit=crop&w=150&q=80', name: 'David (Staff Engineer)' },
        'Google Interviewer': { img: 'https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&w=150&q=80', name: 'Alex (Technical Lead)' },
        'Startup Founder': { img: 'https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?auto=format&fit=crop&w=150&q=80', name: 'Jordan (Founder)' },
        'Strict Interviewer': { img: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=150&q=80', name: 'Mr. Vance (Director)' }
    };

    // --- ENHANCEMENT: Web Speech API (TTS & STT) ---
    const synth = window.speechSynthesis;
    let speechRecog = null;
    let isRecording = false;

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        speechRecog = new SpeechRecognition();
        speechRecog.continuous = true;
        speechRecog.interimResults = true;

        speechRecog.onstart = () => {
            isRecording = true;
            document.getElementById('micBtn').classList.add('recording');
            document.getElementById('answer').placeholder = "Listening... (Speak clearly)";
        };

        speechRecog.onresult = (event) => {
            let finalTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
            }
            if(finalTranscript) {
                const answerField = document.getElementById('answer');
                answerField.value += (answerField.value ? ' ' : '') + finalTranscript;
            }
        };

        speechRecog.onend = () => {
            isRecording = false;
            document.getElementById('micBtn').classList.remove('recording');
            document.getElementById('answer').placeholder = "Type your response or use voice dictation...";
        };
    } else {
        document.getElementById('micBtn').style.display = 'none';
    }

    function toggleMic() {
        if (!interviewActive || !speechRecog) return;
        if (isRecording) {
            speechRecog.stop();
        } else {
            speechRecog.start();
        }
    }

    function speakText(text) {
        if (synth.speaking) synth.cancel(); // Stop current speech if any
        
        // Strip markdown/html for cleaner speech parsing
        const cleanText = text.replace(/<[^>]*>?/gm, '').replace(/[*_]/g, '');
        const utterance = new SpeechSynthesisUtterance(cleanText);
        
        // Visual speaking indicator hooks matching CSS animation
        utterance.onstart = () => document.getElementById('avatarRing').classList.add('speaking');
        utterance.onend = () => document.getElementById('avatarRing').classList.remove('speaking');
        utterance.onerror = () => document.getElementById('avatarRing').classList.remove('speaking');
        
        synth.speak(utterance);
    }

    function getVerdictInfo(score) {
        if (score >= 8) {
            return { text: 'STRONG HIRE', color: 'var(--success)', ready: 'Highly Ready' };
        } else if (score >= 6) {
            return { text: 'GOOD POTENTIAL', color: 'var(--info)', ready: 'Moderately Ready' };
        } else if (score >= 4) {
            return { text: 'NEEDS PREP', color: 'var(--warning)', ready: 'Somewhat Ready' };
        } else {
            return { text: 'NOT READY', color: 'var(--danger)', ready: 'Needs Training' };
        }
    }

    // --- FILE SYSTEM INTERACTION ---
    function uploadResumeFile() {
        const fileInput = document.getElementById("resumeFile");
        const statusDiv = document.getElementById("uploadStatus");
        const uploadBtn = document.getElementById("uploadBtn");

        if (fileInput.files.length === 0) {
            alert("Please pick a valid local document first.");
            return;
        }

        const formData = new FormData();
        formData.append("resume", fileInput.files[0]);

        statusDiv.innerHTML = `<span style="color: var(--text-main);">Processing document context...</span>`;
        uploadBtn.disabled = true;

        fetch("/upload_resume", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            uploadBtn.disabled = false;
            if (data.error) {
                statusDiv.innerHTML = `<span style="color: #ef4444;">❌ Error: ${data.error}</span>`;
            } else {
                statusDiv.innerHTML = `<span style="color: #10b981;">✅ Resume synchronized successfully!</span>`;
            }
        })
        .catch(err => {
            uploadBtn.disabled = false;
            statusDiv.innerHTML = `<span style="color: #ef4444;">❌ Pipeline request failure</span>`;
        });
    }

    function selectMode(element, modeValue) {
        if (interviewActive) return; 
        
        const buttons = document.querySelectorAll('.mode-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
        
        currentMode = modeValue;
        document.body.setAttribute('data-theme', modeValue);
        
        document.getElementById('interviewerAvatar').src = modeConfig[modeValue].img;
        document.getElementById('avatarName').innerText = modeConfig[modeValue].name;
    }

    function startTimer(durationSeconds) {
        clearInterval(countdownInterval);
        const display = document.getElementById("timerBox");
        display.style.display = "block";
        let timeRemaining = durationSeconds;
        
        countdownInterval = setInterval(() => {
            let minutes = Math.floor(timeRemaining / 60);
            let seconds = timeRemaining % 60;
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;
            display.innerText = `Time Left: ${minutes}:${seconds}`;

            if (--timeRemaining < 0) {
                clearInterval(countdownInterval);
                display.innerText = "Time Expired!";
                showReport(true); 
            }
        }, 1000);
    }

    function initInterview() {
        currentRole = document.getElementById("role").value;
        document.getElementById("chatBox").innerHTML = "";
        document.getElementById("report").style.display = "none";
        document.getElementById("chatBox").style.display = "flex";
        
        document.getElementById("answer").disabled = false;
        document.getElementById("submitBtn").disabled = false;
        document.getElementById("micBtn").disabled = false;
        document.getElementById("endBtn").disabled = false;
        
        followUpCount = 0;
        interviewActive = true;

        document.getElementById("role").disabled = true;
        document.getElementById("resumeFile").disabled = true;
        document.getElementById("uploadBtn").disabled = true;
        document.getElementById("startSessionBtn").disabled = true;
        document.getElementById("startSessionBtn").innerText = "Session in Progress...";
        const buttons = document.querySelectorAll('.mode-btn');
        buttons.forEach(btn => btn.disabled = true);

        if(synth.speaking) synth.cancel();

        startTimer(300);

        document.getElementById("chatBox").innerHTML = `<div id="loaderMsg" class="msg interviewer" style="opacity:0.7"><b>${modeConfig[currentMode].name}</b> Setting up environment...</div>`;

        fetch("/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ role: currentRole, mode: currentMode })
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById("loaderMsg").remove();
            currentQuestion = data.question;
            printMsg("interviewer", currentQuestion);
            speakText(currentQuestion); // Fired first question TTS
        });
    }

    function printMsg(roleValue, text) {
        const chatBox = document.getElementById("chatBox");
        const msgDiv = document.createElement("div");
        msgDiv.className = `msg ${roleValue}`;
        
        const label = roleValue === "interviewer" ? modeConfig[currentMode].name : "You";
        const formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        
        msgDiv.innerHTML = `<b>${label}</b><br>${formattedText}`;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendResponse() {
        if (!interviewActive) return;
        const field = document.getElementById("answer");
        const answerText = field.value.trim();
        if (!answerText || !currentQuestion) return;

        if(isRecording && speechRecog) speechRecog.stop();

        printMsg("candidate", answerText);
        field.value = "";
        
        if(synth.speaking) synth.cancel();
        
        const loaderId = "loader_" + Date.now();
        document.getElementById("chatBox").innerHTML += `<div id="${loaderId}" class="msg interviewer" style="opacity:0.5; max-width: 100px;">...</div>`;
        document.getElementById("chatBox").scrollTop = document.getElementById("chatBox").scrollHeight;

        // FIXED: Routed accurately to /evaluate endpoint with structural payload matching backend requirements
        fetch("/evaluate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                role: currentRole,
                mode: currentMode,
                question: currentQuestion,
                answer: answerText,
                follow_up_count: followUpCount
            })
        })
        .then(res => res.json())
        .then(data => {
            const loaderElement = document.getElementById(loaderId);
            if(loaderElement) loaderElement.remove();
            
            if (data.is_follow_up) {
                followUpCount++;
            } else {
                followUpCount = 0;
            }

            if (data.next_question) {
                currentQuestion = data.next_question;
                printMsg("interviewer", currentQuestion);
                speakText(currentQuestion); // Fires following sequential questions TTS
            }
        })
        .catch(err => {
            const loaderElement = document.getElementById(loaderId);
            if(loaderElement) loaderElement.remove();
            printMsg("interviewer", "Error processing response. Please try again.");
        });
    }

    function showReport(autoTriggered) {
        isAutoTriggered = autoTriggered;
        const container = document.getElementById("report");
        container.style.display = "block";
        
        document.getElementById("answer").disabled = true;
        document.getElementById("submitBtn").disabled = true;
        document.getElementById("micBtn").disabled = true;
        document.getElementById("endBtn").disabled = true;
        document.getElementById("chatBox").style.display = "none";
        interviewActive = false;
        clearInterval(countdownInterval);
        
        fetch("/report")
        .then(res => res.json())
        .then(data => {
            if (!data.history || data.history.length === 0) {
                container.innerHTML = `<div style="text-align:center; margin-top:100px;"><h2>Session Aborted</h2><p style="color: var(--text-muted);">No interactions were logged.</p><button class="start-btn" onclick="document.getElementById('report').style.display='none'; location.reload();" style="margin-top:20px;">Restart Session</button></div>`;
                return;
            }

            const avg = data.average_score;
            const scores = data.history.map(h => h.score);
            const highest = Math.max(...scores);
            const lowest = Math.min(...scores);
            const verdict = getVerdictInfo(avg);
            
            const ai = data.ai_analysis;
            
            const dims = [
                { name: "Technical Knowledge", val: ai.dimensions["Technical Knowledge"] },
                { name: "Communication Skills", val: ai.dimensions["Communication Skills"] },
                { name: "Problem Solving", val: ai.dimensions["Problem Solving"] },
                { name: "Confidence", val: ai.dimensions["Confidence"] },
                { name: "Relevance", val: ai.dimensions["Relevance"] }
            ];

            const strengths = ai.strengths;
            const weaknesses = ai.weaknesses;
            const execSummary = ai.executive_summary;

            const roadmapSteps = ai.roadmap.map(step => 
                `<div class="roadmap-item"><div class="roadmap-title">Action Item</div><div class="roadmap-desc">${step}</div></div>`
            ).join("");

            let historyHtml = data.history.map((item, idx) => {
                let sColor = item.score >= 8 ? 'var(--success)' : (item.score >= 5 ? 'var(--warning)' : 'var(--danger)');
                return `
                <div class="qa-card">
                    <div class="qa-header">
                        <div class="qa-q">Q${idx + 1}: ${item.question}</div>
                        <div class="qa-score" style="color: ${sColor}; border-color: ${sColor}40;">Score: ${item.score}/10</div>
                    </div>
                    <div class="qa-a">"${item.answer}"</div>
                    <div class="qa-feedback">
                        <div class="qa-fb-box qa-fb-good">
                            <h4><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg> Analysis</h4>
                            <p>${item.feedback}</p>
                        </div>
                        <div class="qa-fb-box qa-fb-bad">
                            <h4><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Improvement Area</h4>
                            <p>${item.improvement}</p>
                        </div>
                    </div>
                </div>
            `}).join("");

            container.innerHTML = `
                <div class="dash-container">
                    <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                        <div>
                            <h2 style="margin: 0 0 5px 0; font-size: 28px;">Executive Interview Assessment</h2>
                            <p style="margin: 0; color: var(--text-muted);">Role: <b>${currentRole}</b> | Evaluator: <b>${currentMode}</b> ${isAutoTriggered ? '(Time Expired)' : ''}</p>
                        </div>
                        <button class="rep-btn" onclick="document.getElementById('report').style.display='none'; location.reload();">Close Dashboard</button>
                    </div>

                    <div class="kpi-grid">
                        <div class="kpi-card" style="border-left: 4px solid var(--primary);">
                            <div class="kpi-title">Overall Score</div>
                            <div class="kpi-value">${avg}<span style="font-size: 16px; color: var(--text-muted);">/10</span></div>
                            <div class="kpi-sub">Average across ${data.questions_attempted} questions</div>
                        </div>
                        <div class="kpi-card" style="border-left: 4px solid ${verdict.color};">
                            <div class="kpi-title">Recommendation</div>
                            <div class="kpi-value" style="font-size: 24px; color: ${verdict.color};">${verdict.text}</div>
                            <div class="kpi-sub">System Generated Verdict</div>
                        </div>
                        <div class="kpi-card" style="border-left: 4px solid var(--info);">
                            <div class="kpi-title">Readiness Level</div>
                            <div class="kpi-value" style="font-size: 22px;">${verdict.ready}</div>
                            <div class="kpi-sub">Candidate Status</div>
                        </div>
                        <div class="kpi-card" style="border-left: 4px solid var(--text-muted);">
                            <div class="kpi-title">Performance Range</div>
                            <div class="kpi-value" style="font-size: 24px;">${highest} <span style="font-size: 16px; color: var(--text-muted);">High</span> / ${lowest} <span style="font-size: 16px; color: var(--text-muted);">Low</span></div>
                            <div class="kpi-sub">Score Variance</div>
                        </div>
                    </div>

                    <div class="dash-main-grid">
                        <div style="display: flex; flex-direction: column; gap: 20px;">
                            <div class="dash-panel">
                                <div class="panel-header">Multi-Dimensional Analysis</div>
                                ${dims.map(d => {
                                    let pct = d.val * 10;
                                    let clr = pct >= 80 ? 'var(--success)' : (pct >= 55 ? 'var(--warning)' : 'var(--danger)');
                                    return `
                                    <div class="dim-row">
                                        <div class="dim-header"><span>${d.name}</span><span style="color: ${clr}">${d.val}/10</span></div>
                                        <div class="dim-bar-bg"><div class="dim-bar-fill" style="width: ${pct}%; background: ${clr};"></div></div>
                                    </div>
                                    `
                                }).join('')}
                            </div>
                            
                            <div class="dash-panel">
                                <div class="panel-header">Key Identifiers</div>
                                <h4 style="margin: 0 0 10px 0; font-size: 13px; color: var(--text-muted); text-transform: uppercase;">Top Strengths</h4>
                                <div class="badge-container">
                                    ${strengths.map(s => `<div class="badge strength"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>${s}</div>`).join('')}
                                </div>
                                <h4 style="margin: 0 0 10px 0; font-size: 13px; color: var(--text-muted); text-transform: uppercase;">Areas for Improvement</h4>
                                <div class="badge-container" style="margin-bottom: 0;">
                                    ${weaknesses.map(w => `<div class="badge improve"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>${w}</div>`).join('')}
                                </div>
                            </div>
                        </div>

                        <div style="display: flex; flex-direction: column; gap: 20px;">
                            <div class="dash-panel" style="background: var(--primary); color: white; border: none;">
                                <div class="panel-header" style="border-color: rgba(255,255,255,0.2); color: #fff;">Executive Summary</div>
                                <p style="font-size: 15px; line-height: 1.6; margin: 0;">${execSummary}</p>
                            </div>
                            
                            <div class="dash-panel" style="flex: 1;">
                                <div class="panel-header">Personalized Learning Roadmap</div>
                                <div class="roadmap">
                                    ${roadmapSteps}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="dash-panel" style="margin-top: 10px;">
                        <div class="panel-header">Detailed Interaction Telemetry</div>
                        <div class="qa-list">
                            ${historyHtml}
                        </div>
                    </div>
                </div>
            `;
            
            setTimeout(() => {
                document.querySelectorAll('.dim-bar-fill').forEach(bar => {
                    let w = bar.style.width;
                    bar.style.width = '0%';
                    setTimeout(() => bar.style.width = w, 50);
                });
            }, 100);
        })
        .catch(err => {
            container.innerHTML = `<div style="text-align:center; margin-top:100px;"><h2>Error Loading Report</h2><p style="color: var(--text-muted);">Failed to retrieve session data.</p><button class="start-btn" onclick="location.reload();" style="margin-top:20px;">Reload Page</button></div>`;
        });
    }
</script>

</body>
</html>
